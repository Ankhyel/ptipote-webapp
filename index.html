<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PTIPOTE Zone 0 - Proto 1</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-hud" aria-label="Etat de l'ilot">
      <div>
        <p class="eyebrow">Zone 0 - Proto 1</p>
        <h1>Ilot PTIPOTE</h1>
      </div>
      <div class="hud-stats" id="hudStats"></div>
    </header>

    <main class="main-view">
      <section class="view active" id="viewIsland" data-view="island" aria-labelledby="islandTitle">
        <div class="section-title">
          <div>
            <p class="eyebrow">Base</p>
            <h2 id="islandTitle">Ecran Ilot</h2>
          </div>
          <button class="ghost-button" id="resetButton" type="button">Reset</button>
        </div>
        <div class="island-grid" id="buildingGrid"></div>
      </section>

      <section class="view" id="viewPtipotes" data-view="ptipotes" aria-labelledby="ptipotesTitle">
        <div class="section-title">
          <div>
            <p class="eyebrow">Equipe</p>
            <h2 id="ptipotesTitle">P'TIPOTES</h2>
          </div>
        </div>
        <div class="ptipote-list" id="ptipoteList"></div>
      </section>

      <section class="view" id="viewJournal" data-view="journal" aria-labelledby="journalTitle">
        <div class="section-title">
          <div>
            <p class="eyebrow">Suivi</p>
            <h2 id="journalTitle">Journal</h2>
          </div>
        </div>
        <article class="objective-card">
          <p class="eyebrow">Objectif actuel</p>
          <p id="currentObjective"></p>
        </article>
        <div class="journal-list" id="journalList"></div>
      </section>
    </main>

    <section class="bottom-sheet" id="bottomSheet" aria-live="polite">
      <div class="sheet-handle" aria-hidden="true"></div>
      <div id="sheetContent"></div>
    </section>

    <nav class="bottom-nav" aria-label="Navigation principale">
      <button class="nav-button active" type="button" data-tab="island">Ilot</button>
      <button class="nav-button" type="button" data-tab="ptipotes">P'TIPOTES</button>
      <button class="nav-button" type="button" data-tab="journal">Journal</button>
    </nav>
  </div>

  <script src="./data.js"></script>
  <script src="./state.js"></script>
  <script src="./tasks.js"></script>
  <script src="./ui-island.js"></script>
  <script src="./ui-panels.js"></script>
  <script src="./main.js"></script>
</body>
</html>
