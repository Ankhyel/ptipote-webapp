<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PTIPOTE - Carte NFC</title>
  <link rel="stylesheet" href="/PTIPOTE_V1/style.css?v=20260617-01" />
</head>
<body>
  <main class="page">
    <header id="heroCard" class="hero" style="--type-color:#4f8cff;">
      <div class="heroMedia">
        <img id="speciesImage" src="/img/bplaceholder.png" alt="PTIPOTE" />
      </div>
      <div class="heroContent">
        <p class="eyebrow">PTIPOTE</p>
        <div class="heroBottom">
          <div class="heroText">
            <h1 id="heroSpecies">Espèce inconnue</h1>
            <p id="heroType" class="heroType">Type inconnu</p>
          </div>
          <div class="heroActions">
            <button id="themeToggle" class="themeCard" type="button" aria-label="Activer le mode clair" aria-pressed="false">
              <span id="themeToggleIcon" aria-hidden="true">🌙</span>
            </button>
            <a class="shopCard" href="https://shop.ptipotes.com" target="_blank" rel="noopener noreferrer" aria-label="Ouvrir la boutique">
              <span class="emoji" aria-hidden="true">🛒</span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <div id="status" class="status"></div>

    <section>
      <div id="infoCards" class="grid"></div>
    </section>
  </main>
  <div id="actionToast" class="actionToast" role="status" aria-live="polite"></div>

  <script src="/PTIPOTE_V1/lz-string.min.js?v=20260617-01"></script>
  <script src="/PTIPOTE_V1/app.js?v=20260617-01"></script>
</body>
</html>
