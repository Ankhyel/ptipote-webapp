<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>P'TIPOTE 💘</title>
  <meta name="theme-color" content="#ff4d8d" />
  <style>
    :root{
      --bg:#fde6ee;
      --card:#ffffff;
      --accent:#d6006e;
      --text:#222;
      --muted:#666;
    }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(1200px 800px at 20% 10%, #fff 0%, var(--bg) 55%) fixed;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
    }
    .wrap{ width:min(520px,92vw); padding:18px; }
    .card{
      background:var(--card);
      border-radius:18px;
      padding:18px 16px;
      box-shadow: 0 18px 45px rgba(0,0,0,.12);
      border: 1px solid rgba(214,0,110,.14);
    }
    .badge{
      display:inline-block;
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      background: rgba(214,0,110,.08);
      color: var(--accent);
      font-weight:700;
      letter-spacing:.3px;
    }
    h1{
      margin:10px 0 8px;
      font-size:22px;
      line-height:1.15;
      color: var(--accent);
    }
    p{ margin:10px 0; font-size:16px; line-height:1.5; }
    .sig{ margin-top:14px; font-size:14px; color:var(--muted); }
    .err{
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      background:#fff4f7;
      border:1px dashed rgba(214,0,110,.35);
      color:#7a003d;
      font-size:14px;
      display:none;
    }
    .footer{
      margin-top:10px;
      font-size:12px;
      color:rgba(0,0,0,.45);
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <span class="badge">P'TIPOTE • Saint-Valentin</span>
      <h1 id="title">Un petit message t'attend 💘</h1>
      <p id="msg">Scanne la figurine pour afficher le message…</p>
      <div class="sig" id="sig"></div>
      <div class="err" id="err"></div>
    </div>
    <div class="footer">Astuce: l'URL contient le message encodé. Aucun compte nécessaire.</div>
  </div>

<script>
  // Base32 (RFC4648) decoder - compact, sans dépendances
  function base32DecodeToUtf8(input) {
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
    let clean = (input || "")
      .toUpperCase()
      .replace(/[^A-Z2-7=]/g, ""); // enlève espaces/parasites
    // padding optionnel, on tolère
    let bits = 0, value = 0;
    const bytes = [];
    for (let i = 0; i < clean.length; i++) {
      const ch = clean[i];
      if (ch === "=") break;
      const idx = alphabet.indexOf(ch);
      if (idx === -1) continue;
      value = (value << 5) | idx;
      bits += 5;
      if (bits >= 8) {
        bytes.push((value >>> (bits - 8)) & 255);
        bits -= 8;
      }
    }
    // UTF-8 decode
    const decoder = new TextDecoder("utf-8", { fatal: false });
    return decoder.decode(new Uint8Array(bytes));
  }

  function getPayload() {
    // Priorité au hash (#PAYLOAD) car il ne part pas au serveur (pratique, propre)
    const h = (location.hash || "").replace(/^#/, "").trim();
    if (h) return h;

    // Sinon query ?m=PAYLOAD
    const url = new URL(location.href);
    const m = url.searchParams.get("m");
    return (m || "").trim();
  }

  function safeText(s, max=500) {
    // évite les énormes textes accidentels
    s = (s || "").toString();
    return s.length > max ? s.slice(0, max) + "…" : s;
  }

  // Format recommandé du message décodé (simple):
  // title|message|signature
  // Exemple: "Bonne Saint-Valentin|Je t'aime...|— Alex"
  function parseDecoded(decoded) {
    const parts = decoded.split("|");
    return {
      title: safeText(parts[0] || "Bonne Saint-Valentin 💖", 80),
      msg: safeText(parts[1] || decoded || "Message manquant.", 600),
      sig: safeText(parts[2] || "", 80),
    };
  }

  (function init(){
    const err = document.getElementById("err");
    const payload = getPayload();

    if (!payload) {
      err.style.display = "block";
      err.textContent = "Aucun message dans l'URL. Exemple: https://tonsite/#BASE32…";
      return;
    }

    let decoded = "";
    try {
      decoded = base32DecodeToUtf8(payload);
      if (!decoded || decoded.trim().length === 0) throw new Error("Décodage vide");
    } catch (e) {
      err.style.display = "block";
      err.textContent = "Impossible de décoder le message. Vérifie le Base32 dans l'URL.";
      return;
    }

    const {title, msg, sig} = parseDecoded(decoded);
    document.getElementById("title").textContent = title;
    document.getElementById("msg").textContent = msg;
    document.getElementById("sig").textContent = sig;
  })();
</script>
</body>
</html>
