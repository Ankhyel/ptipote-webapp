<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>P'TIPOTE Love</title>
  <meta name="theme-color" content="#d6006e">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="wrap">
    <div class="card">
      <!-- Zone visuelle (sans cadre) -->
      <div class="hero" aria-hidden="true">
        <div id="sparkles" class="sparkles"></div>

        <div class="ptipoteWrap">
          <img id="ptipoteImg" class="ptipote" alt="P'TIPOTE">
          <div id="heartEmoji" class="heartEmoji" aria-hidden="true">💗</div>
        </div>
      </div>

      <!-- Cadre du message (sous) -->
      <div class="messageFrame">
        <p id="msg" class="msg">…</p>
        <div class="sig" id="sig"></div>
      </div>

      <div class="err" id="err"></div>
      <div class="hint" id="hint">Scanne ton P’TIPOTE pour découvrir le message.</div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
