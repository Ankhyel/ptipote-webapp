<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>P'TIPOTE Love</title>
  <meta name="theme-color" content="#d6006e">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <img id="ptipoteImg" class="ptipote" alt="P'TIPOTE">
        <div id="heartEmoji" class="heartEmoji" aria-hidden="true">💗</div>
        <div id="sparkles" class="sparkles" aria-hidden="true"></div>
      </div>

      <h1 id="title">Un petit message t'attend 💘</h1>
      <p id="msg">…</p>
      <div class="sig" id="sig"></div>

      <div class="err" id="err"></div>
      <div class="hint" id="hint">Scanne ton P’TIPOTE pour découvrir le message.</div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
